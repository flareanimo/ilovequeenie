<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>for queeenie</title>
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ffdde1, #fceabb);
  font-family: 'Arial', sans-serif;
  overflow: hidden;
}

/* Caption */
h1 {
  font-size: 3rem;
  color: #ff4d6d;
  text-align: center;
  margin-top: 20px;
  animation: fadeIn 2s ease forwards;
  opacity: 0;
}

/* Fade in animation for text */
@keyframes fadeIn {
  to { opacity: 1; }
}

/* Flower image styling */
.flower {
  width: 300px;
  height: 300px;
  background: url('https://upload.wikimedia.org/wikipedia/commons/6/6b/Red_Rose_Flower.JPG') no-repeat center/contain;
  animation: pulse 3s infinite alternate;
}

/* Simple pulse animation for flower */
@keyframes pulse {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}
</style>
</head>
<body>

<div class="flower"></div>
<h1>for queeenie</h1>

</body>
</html>
