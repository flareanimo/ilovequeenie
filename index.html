<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>for queeeenie</title>

<!-- Girlie Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ffdde1, #fceabb);
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
}

/* Flower Image */
.flower {
  width: 240px;
  animation: float 4s ease-in-out infinite;
  z-index: 2;
}

/* Caption */
h1 {
  font-family: 'Pacifico', cursive;
  font-size: 2.2rem; /* smaller */
  color: #ff4d6d;
  margin-top: 15px;
  letter-spacing: 1px;
  opacity: 0;
  animation: fadeIn 2s ease forwards 1s;
  z-index: 2;
}

/* Glow effect */
h1::after {
  content: "";
  display: block;
  width: 50%;
  height: 8px;
  margin: 8px auto 0;
  background: radial-gradient(circle, #ff4d6d, transparent);
  filter: blur(6px);
}

/* Animations */
@keyframes fadeIn {
  to { opacity: 1; }
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-12px); }
  100% { transform: translateY(0px); }
}

/* Falling petals */
.petal {
  position: absolute;
  top: -10px;
  width: 12px;
  height: 12px;
  background: rgba(255, 105, 180, 0.7);
  border-radius: 50%;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
  }
}
</style>
</head>

<body>

<img class="flower" src="https://pngimg.com/uploads/rose/rose_PNG649.png" alt="Flower">

<h1>for queeeenie &lt;3</h1>

<script>
function createPetal() {
  const petal = document.createElement("div");
  petal.classList.add("petal");

  petal.style.left = Math.random() * window.innerWidth + "px";
  petal.style.animationDuration = (3 + Math.random() * 5) + "s";

  document.body.appendChild(petal);

  setTimeout(() => {
    petal.remove();
  }, 8000);
}

setInterval(createPetal, 300);
</script>

</body>
</html>
